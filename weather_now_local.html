<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #e0e0e0; font-family: sans-serif; }
  
  .container {
    width: 840px; height: 480px; background: #fff; color: #000;
    font: 400 16px Georgia, serif;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 30px 100px 30px 35px;
    text-rendering: optimizeLegibility;
    position: relative;
    overflow: hidden;
  }
  .top-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .col-left { width: 230px; }
  .col-center { flex: 1; text-align: center; }
  .col-right { width: 210px; text-align: right; }
  .loc { font-size: 28px; font-weight: bold; line-height: 1; }
  .sub-loc { font-size: 18px; margin-top: 2px; }
  .date-line { font-size: 12px; margin-top: 6px; display: block; }
  .sun { font-size: 12px; margin-top: 8px; border-top: 1px solid #000; display: inline-block; padding-top: 4px; white-space: nowrap; }
  .temp-big { font-size: 115px; line-height: .8; }
  .cond-big { font-size: 25px; margin-top: 5px; }
  .details { font-size: 17px; line-height: 1.6; }
  .flourish-swoosh { height: 22px; margin: 12px 0 6px auto; display: block; width: 60px; }
  .quote { font-size: 15px; line-height: 1.25; }
  .hourly-row { display: grid; grid-template-columns: repeat(5, 70px) 1fr; column-gap: 20px; border-top: 3px solid #000; border-bottom: 3px solid #000; padding: 15px 0; margin: 5px 0; }
  .h-col { text-align: center; }
  .later-col { text-align: left; padding-left: 10px; }
  .v-time { font-size: 16px; font-weight: bold; height: 18px; line-height: 18px; }
  .v-temp { font-size: 21px; margin: 2px 0; height: 25px; line-height: 25px; }
  .v-cond { font-size: 11px; height: 28px; margin-bottom: 0; line-height: 14px; display: block; overflow: hidden; } 
  .v-data { font-size: 11px; height: 14px; line-height: 14px; }
  .later-text { font-size: 11px; line-height: 14px; margin-top: 0; }
  .info-block, .footer { font-size: 19px; line-height: 1.3; }
</style>
</head>
<body>

<div id="dashboard" class="container">
  <div style="text-align:center; padding-top:200px;">Loading Weather...</div>
</div>

<script>
async function fetchWeather() {
  const lat = 56.60712432274488;
  const lon = -3.0858753489219812;
  
  // FIXED: Added &wind_speed_unit=mph to ensure API data matches TRMNL units
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability,weather_code,wind_speed_10m,wind_gusts_10m&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max,weather_code,wind_speed_10m_max,wind_gusts_10m_max&timezone=Europe%2FLondon&forecast_days=3&wind_speed_unit=mph`;

  try {
    const response = await fetch(url);
    const data = await response.json();
    renderDashboard(data);
  } catch (error) {
    document.getElementById('dashboard').innerHTML = `<div style="text-align:center; padding-top:200px; color:red;">Failed to load data. Ensure you have an internet connection.</div>`;
  }
}

function getOrdinalNum(n) {
  const s = ["th", "st", "nd", "rd"];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function formatAmPm(hour) {
  if (hour === 0) return "12am";
  if (hour < 12) return hour + "am";
  if (hour === 12) return "12pm";
  return (hour - 12) + "pm";
}

function formatSunTime(isoStr) {
  const time = isoStr.split("T")[1];
  let [h, m] = time.split(":");
  h = parseInt(h);
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12;
  if (h === 0) h = 12;
  return `${h}.${m}${ampm}`;
}

function getCondString(code, isNight, wind, prob, format) {
  if (format === 'hourly') {
    if (code === 0) return isNight ? "Clear" : "Sunny";
    if (code === 1) return isNight ? "Mostly clear" : "Mostly sunny";
    if (code === 2) return "Partly cloudy";
    if (code === 3) return "Cloudy";
    if (code >= 95) return "Thunder";
    if (code >= 71 && code <= 86) return "Snow";
    if (code >= 61 && code <= 67) return "Rain";
    if (code >= 80 && code <= 82) return "Showers";
    if (code >= 51 && code <= 57) return "Drizzle";
    if (wind > 20) return "Windy";
    if (code === 45 || code === 48) return "Fog";
    if (prob >= 40) return "Showers";
    return "Cloudy";
  } else if (format === 'summary') {
    if (code === 0) return isNight ? "Clear sky. " : "Sunny. ";
    if (code === 1) return isNight ? "Mostly clear. " : "Mostly sunny. ";
    if (code === 2) return "Partly cloudy. ";
    if (code === 45 || code === 48) return "Foggy. ";
    return "Cloudy. ";
  } else {
    if (code === 0) return isNight ? "Clear sky" : "Sunny";
    if (code === 1) return isNight ? "Mostly clear" : "Mostly sunny";
    if (code === 2) return "Partly cloudy";
    if (code === 3) return "Cloudy";
    if (code >= 95) return "Thunder";
    if (code >= 71 && code <= 86) return "Snow";
    if (code === 77) return "Snow";
    if (code >= 61 && code <= 67) return "Rain";
    if (code >= 80 && code <= 82) return "Showers";
    if (code >= 51 && code <= 57) return "Drizzle";
    if (code === 45 || code === 48) return "Fog";
    if (wind > 20) return "Windy";
    if (prob >= 40) return "Rain";
    return "Cloudy";
  }
}

function renderDashboard(data) {
  const d = data;
  
  const now = new Date();
  const ukTime = new Date(now.toLocaleString("en-US", {timeZone: "Europe/London"}));
  
  const y = ukTime.getFullYear();
  const m = String(ukTime.getMonth() + 1).padStart(2, '0');
  const dStr = String(ukTime.getDate()).padStart(2, '0');
  const hStr = String(ukTime.getHours()).padStart(2, '0');
  
  const targetHour = `${y}-${m}-${dStr}T${hStr}:00`;
  const targetDay = `${y}-${m}-${dStr}`;
  
  let hr_now = d.hourly.time.indexOf(targetHour);
  let day_now = d.daily.time.indexOf(targetDay);
  
  if (hr_now === -1) hr_now = ukTime.getHours(); 
  if (day_now === -1) day_now = 0;

  const current_h_int = ukTime.getHours();
  const endOfDayIdx = hr_now + (23 - current_h_int); 
  
  const cur_p = d.hourly.precipitation_probability[hr_now];
  const cur_c = d.hourly.weather_code[hr_now];
  const cur_w = d.hourly.wind_speed_10m[hr_now];
  const cur_g = d.hourly.wind_gusts_10m[hr_now];
  const cur_t = Math.round(d.hourly.temperature_2m[hr_now]);
  
  const sunset_hr = parseInt(d.daily.sunset[day_now].split("T")[1].split(":")[0]);
  const sunrise_hr = parseInt(d.daily.sunrise[day_now].split("T")[1].split(":")[0]);
  const isNight = current_h_int >= sunset_hr || current_h_int < sunrise_hr;

  const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  const dateString = `${days[ukTime.getDay()]}, ${months[ukTime.getMonth()]} ${getOrdinalNum(ukTime.getDate())}, ${ukTime.getFullYear()}`;

  const condBig = getCondString(cur_c, isNight, cur_w, cur_p, 'big');
  let rainStr = cur_p === 0 ? "Dry" : `${(cur_c >= 71 && cur_c <= 86) ? 'Snow' : (cur_c >= 95 ? 'Hail' : 'Rain')}: ${cur_p}%`;
  let windStr = cur_g < 10 ? "Calm" : `Wind: ${Math.round(cur_w)}/${Math.round(cur_g)}mph`;

  let hourlyHTML = "";
  for (let i = 1; i <= 5; i++) {
    const idx = hr_now + i;
    const hp = d.hourly.precipitation_probability[idx];
    const hc = d.hourly.weather_code[idx];
    const ht = Math.round(d.hourly.temperature_2m[idx]);
    const hw = d.hourly.wind_speed_10m[idx];
    const hg = d.hourly.wind_gusts_10m[idx];
    const hi = parseInt(d.hourly.time[idx].split("T")[1].split(":")[0]);
    const hIsNight = hi >= sunset_hr || hi < sunrise_hr;
    
    const hCond = getCondString(hc, hIsNight, hw, hp, 'hourly');
    const hRain = hp === 0 ? "Dry" : `Rain: ${hp}%`;
    const hWind = hg < 10 ? "Calm" : `${Math.round(hw)}/${Math.round(hg)}mph`;
    const hTime = formatAmPm(hi);

    hourlyHTML += `
      <div class="h-col">
        <div class="v-time">${hTime}</div>
        <div class="v-temp">${ht}°</div>
        <div class="v-cond">${hCond}</div>
        <div class="v-data">${hRain}</div>
        <div class="v-data">${hWind}</div>
      </div>
    `;
  }

  let laterHTML = "";
  if (current_h_int >= 18) {
    laterHTML = `<div class="v-time">Sleep well</div>`;
  } else {
    const scanStart = hr_now + 6;
    let fMax = -99;
    for (let k = scanStart; k <= endOfDayIdx; k++) {
      if (d.hourly.temperature_2m[k] > fMax) fMax = d.hourly.temperature_2m[k];
    }
    
    let uLow = 99;
    const scanEnd = hr_now + 18;
    for (let k = scanStart; k <= scanEnd; k++) {
      if (d.hourly.temperature_2m[k] < uLow) uLow = d.hourly.temperature_2m[k];
    }

    const r_fMax = Math.round(fMax);
    const r_tMax = Math.round(d.daily.temperature_2m_max[day_now]);
    const tempDisplay = (r_fMax >= r_tMax) ? `${r_tMax}°/${Math.round(uLow)}°` : `${Math.round(uLow)}°`;

    let lmp = 0, lc = 99, lwm = 0, lgm = 0;
    for (let j = scanStart; j <= endOfDayIdx; j++) {
      if (d.hourly.precipitation_probability[j] > lmp) lmp = d.hourly.precipitation_probability[j];
      if (d.hourly.weather_code[j] < lc) lc = d.hourly.weather_code[j];
      if (d.hourly.wind_speed_10m[j] > lwm) lwm = d.hourly.wind_speed_10m[j];
      if (d.hourly.wind_gusts_10m[j] > lgm) lgm = d.hourly.wind_gusts_10m[j];
    }

    let laterSum = getCondString(lc, true, lwm, lmp, 'summary');
    if (lmp >= 40) {
      let lpp = 0, lphRes = 0;
      for (let j = scanStart; j <= endOfDayIdx; j++) {
        if (d.hourly.precipitation_probability[j] > lpp) {
          lpp = d.hourly.precipitation_probability[j];
          lphRes = parseInt(d.hourly.time[j].split("T")[1].split(":")[0]);
        }
      }
      laterSum += `Rain at ${formatAmPm(lphRes)} (${lmp}%). `;
    } else {
      laterSum += `Likely dry. `;
    }
    laterSum += lgm < 10 ? `Probably calm.` : `Winds ${Math.round(lwm)}/${Math.round(lgm)}mph.`;

    laterHTML = `
      <div class="v-time">Later</div>
      <div class="v-temp">${tempDisplay}</div>
      <div class="later-text">${laterSum}</div>
    `;
  }

  let nLow = 100, nWi = 0, nGu = 0, nMp = 0, nPhRes = 0;
  const nightStartIdx = endOfDayIdx - 1; 
  const nightEndIdx = endOfDayIdx + 7;   
  
  for (let j = nightStartIdx; j <= nightEndIdx; j++) {
    if (j >= hr_now) {
      if (d.hourly.temperature_2m[j] < nLow) nLow = d.hourly.temperature_2m[j];
      if (d.hourly.wind_speed_10m[j] > nWi) nWi = d.hourly.wind_speed_10m[j];
      if (d.hourly.wind_gusts_10m[j] > nGu) nGu = d.hourly.wind_gusts_10m[j];
      if (d.hourly.precipitation_probability[j] > nMp) {
        nMp = d.hourly.precipitation_probability[j];
        nPhRes = parseInt(d.hourly.time[j].split("T")[1].split(":")[0]);
      }
    }
  }
  
  const midnightIdx = endOfDayIdx + 1;
  const nightC = d.hourly.weather_code[midnightIdx];
  let nightCond = "cloudy";
  if (nightC === 0) nightCond = "clear";
  else if (nightC === 1) nightCond = "mostly clear";
  else if (nightC === 2) nightCond = "partly cloudy";
  else if (nightC === 45 || nightC === 48) nightCond = "foggy";

  let overHTML = `Likely ${nightCond}. Lows of ${Math.round(nLow)}°. `;
  if (nMp >= 40) {
    overHTML += `Rain at ${formatAmPm(nPhRes)} (${nMp}%). `;
  } else {
    overHTML += `Likely dry. `;
  }
  overHTML += nGu < 10 ? `Probably calm.` : `Winds ${Math.round(nWi)}/${Math.round(nGu)}mph.`;

  const tomIdx = day_now + 1;
  const tomMp = d.daily.precipitation_probability_max[tomIdx];
  const tomTc = d.daily.weather_code[tomIdx];
  const tomGu = d.daily.wind_gusts_10m_max[tomIdx];
  const tomWi = d.daily.wind_speed_10m_max[tomIdx];
  const tMax = Math.round(d.daily.temperature_2m_max[tomIdx]);
  const tMin = Math.round(d.daily.temperature_2m_min[tomIdx]);

  let tomCond = "Cloudy.";
  if (tomTc === 0) tomCond = "Sunny.";
  else if (tomTc === 1) tomCond = "Mostly sunny.";
  else if (tomTc === 2) tomCond = "Partly cloudy.";
  else if (tomTc === 45 || tomTc === 48) tomCond = "Foggy.";
  else if (tomTc >= 95) tomCond = "Thunder.";
  else if (tomTc >= 71 && tomTc <= 86) tomCond = "Snowy.";

  let tomStr = `${tomCond} Highs of ${tMax}°, lows of ${tMin}°. `;
  if (tomMp >= 40) {
    let tomPp = 0, tomPhRes = 0;
    const tomStartIdx = endOfDayIdx + 1;  
    const tomEndIdx = endOfDayIdx + 24;   
    
    for (let j = tomStartIdx; j <= tomEndIdx; j++) {
      if (d.hourly.precipitation_probability[j] > tomPp) {
        tomPp = d.hourly.precipitation_probability[j];
        tomPhRes = parseInt(d.hourly.time[j].split("T")[1].split(":")[0]);
      }
    }
    let type = "rain";
    if (tomTc >= 71 && tomTc <= 86) type = "snow";
    else if (tomTc >= 51 && tomTc <= 57) type = "drizzle";
    else if (tomTc >= 80 && tomTc <= 82) type = "showers";
    tomStr += `Expect ${type} at about ${formatAmPm(tomPhRes)} (${tomMp}%). `;
  } else {
    tomStr += `Likely dry. `;
  }
  tomStr += tomGu < 10 ? `Probably calm.` : `Winds ${Math.round(tomWi)}/${Math.round(tomGu)}mph.`;

  document.getElementById('dashboard').innerHTML = `
    <div class="top-row">
      <div class="col-left">
        <div class="loc">Weather now</div>
        <div class="sub-loc">Castleton of Eassie</div>
        <div class="date-line">${dateString}</div>
        <div class="sun">Sunrise ${formatSunTime(d.daily.sunrise[day_now])} <span style="font-size: 10px; margin: 0 1px;">&#9728;</span> Sunset ${formatSunTime(d.daily.sunset[day_now])}</div>
      </div>
      <div class="col-center">
        <div class="temp-big">${cur_t}°</div>
        <div class="cond-big">${condBig}</div>
      </div>
      <div class="col-right">
        <div class="details">
          <div>${rainStr}</div>
          <div>${windStr}</div>
          <svg class="flourish-swoosh" viewBox="0 0 100 30" preserveAspectRatio="none"><path d="M0,15 C20,35 40,-5 60,15 C80,35 100,-5 120,15" stroke="black" stroke-width="3.5" fill="none" stroke-linecap="round"/></svg>
          <div class="quote">‘Inspiration is the<br>Temple of Quest’</div>
        </div>
      </div>
    </div>
    <div class="hourly-row">
      ${hourlyHTML}
      <div class="later-col">
        ${laterHTML}
      </div>
    </div>
    <div class="info-block">
      <b>Overnight:</b> ${overHTML}
    </div>
    <div class="footer">
      <b>Tomorrow:</b> ${tomStr}
    </div>
  `;
}

fetchWeather();
</script>
</body>
</html>
